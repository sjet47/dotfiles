#################################################
# Unbindings
#################################################
# 解绑默认 prefix C-b（下面会换成 C-o）
unbind C-b

############################################################################
# Reset Prefix
############################################################################
# Remap prefix from 'C-b' to 'C-o'
set -g prefix C-o
bind-key C-o send-prefix

############################################################################
# Global options
############################################################################
# prefix + r 重新加载本配置文件
bind r source-file ~/.tmux.conf

# tmux 收到 ESC 后等待续按键的毫秒数；设 0 让 vim 的 ESC 即时响应
# 副作用：极小概率把分两次到达的转义序列误判为单独 ESC（现代终端基本不会）
set -sg escape-time 0

# 强制 tmux 用 zsh，绕开继承到的错误 $SHELL
# 当前已用 zsh，所以注释掉；如果以后 tmux 又跑成 bash 取消注释即可
#set -g default-shell /usr/bin/zsh

# 窗口编号从 1 开始（默认 0），切换时 prefix+1 比 prefix+0 顺手
set -g base-index 1

############################################################################
# Pane / Window 操作（tmux-pain-control 风格内联）
############################################################################
# 分屏：| / - 在当前 pane 内分；\ / _ 跨整个 window 全宽/全高分；
# 全部继承当前 pane 工作目录；% 和 " 覆盖默认绑定让它们也继承路径
bind | split-window -h  -c '#{pane_current_path}'
bind \\ split-window -fh -c '#{pane_current_path}'
bind - split-window -v  -c '#{pane_current_path}'
bind _ split-window -fv -c '#{pane_current_path}'
bind % split-window -h  -c '#{pane_current_path}'
bind '"' split-window -v -c '#{pane_current_path}'

# 切 pane：prefix + h/j/k/l 或 C-h/C-j/C-k/C-l 都行
# -r 重复模式：连按时不需要重新按 prefix
bind -r h   select-pane -L
bind -r C-h select-pane -L
bind -r j   select-pane -D
bind -r C-j select-pane -D
bind -r k   select-pane -U
bind -r C-k select-pane -U
bind -r l   select-pane -R
bind -r C-l select-pane -R

# resize pane：prefix + Shift + h/j/k/l，每次 5 格（避免和 select 误触）
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# 窗口左右挪位：prefix + < / >
bind -r '<' swap-window -d -t -1
bind -r '>' swap-window -d -t +1

# prefix + c 新建窗口时也继承当前 pane 路径（默认是 home）
bind c new-window -c '#{pane_current_path}'

############################################################################
# Alt 直接键（无需 prefix，-n 标志）
############################################################################
# Alt + 数字：直接跳到对应窗口（注意会接管 readline 的 digit-argument）
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Alt + h/l：左右切窗口
bind -n M-h previous-window
bind -n M-l next-window

# Alt + i/o：把当前窗口左/右挪一位（-d 让焦点留在被移动的窗口里）
bind -n M-i swap-window -d -t -1
bind -n M-o swap-window -d -t +1

############################################################################
# Status bar
############################################################################
# 整条状态栏总开关与配色：黄字 + 深灰底
set -g status on
set -g status-fg yellow
set -g status-bg colour235
set -g status-interval 2          # 刷新频率（秒），影响 CPU/时间等动态字段
set -g status-justify left        # 窗口列表靠左对齐

# 左侧：用户名@主机 + 当前 pane 工作目录
set -g status-left-length 80
set -g status-left "#[fg=brightblue] $USER@#h#[fg=green]#{pane_current_path} "

# 窗口列表格式：#F=标志 #I=窗口号 #W=窗口名 #P=pane号 #{window_panes}=pane 总数
# 非当前窗口：保持状态栏配色
setw -g window-status-format '#F[#I]#W:#P/#{window_panes}'
# 当前窗口：黑字黄底加粗，明显区分
setw -g window-status-current-format '#F[#I]#W:#P/#{window_panes}'
setw -g window-status-current-style 'fg=black,bg=yellow,bold'

# 右侧：CPU 占用 + 系统 load + 时间（CPU 段依赖 tmux-cpu 插件）
set -g status-right-length 80
set -g status-right " #{cpu_fg_color}󰍛 #{cpu_percentage} #{ram_fg_color}󰘚 #{ram_percentage} #[fg=cyan]Load#(uptime | awk -F '[a-z]:' '{ print $2 }')#[fg=white]  %H:%M %Y-%m-%d "

# 关闭所有窗口活动/静默/响铃的视觉提醒（不会闪状态栏）
# 想要"后台窗口有输出时高亮提醒"可以把 visual-activity 改 on
set -g visual-bell off
set -g visual-silence off
set -g visual-activity off

# 鼠标支持：滚轮翻 history、点击切 pane、拖边框 resize
set -g mouse on

############################################################################
# Sensible defaults（原 tmux-plugins/tmux-sensible 内联，去掉跨平台条件）
############################################################################
set -g history-limit 50000                  # 滚动缓冲，默认 2000 太少
set -g display-time 4000                    # tmux 消息显示时长（ms），默认 750 太短
set -g default-terminal "tmux-256color"     # tmux 内 $TERM；tmux-256color 是给 tmux 用的官方 terminfo
set -s default-terminal "tmux-256color"     # 同时设 server 选项（tmux 2.0+）
# 真彩色（24-bit RGB）转发：当外层终端是 xterm-256color 时声明它支持 RGB
# 用 -ag/append 而非 set，避免覆盖其他默认 overrides
set -ag terminal-overrides ",xterm-256color:RGB"
set -g status-keys emacs                    # prefix : 命令行行内编辑用 emacs 键
set -g focus-events on                      # 把焦点变化转发给 vim 等（启用 FocusGained/Lost）

# 多客户端共享会话时按当前窗口最小公共尺寸调整 pane
# iTerm2 自带 resize 行为会和它打架，所以在 iTerm 下关掉
setw -g aggressive-resize on
if-shell '[ -n "$ITERM_SESSION_ID" ] || [[ "$LC_TERMINAL" =~ ^iTerm ]]' \
    'setw -g aggressive-resize off'

bind C-p previous-window                    # prefix + Ctrl-p 上一个窗口
bind C-n next-window                        # prefix + Ctrl-n 下一个窗口

############################################################################
# Plugin options（TPM 管理；安装：prefix + I，更新：prefix + U，卸载：prefix + alt+u）
############################################################################
set -g @plugin 'tmux-plugins/tpm'             # 插件管理器本体
set -g @plugin 'tmux-plugins/tmux-cpu'        # 提供 #{cpu_*} 等变量给 status-right
set -g @plugin 'tmux-plugins/tmux-resurrect'  # 保存/恢复 tmux 会话布局
set -g @plugin 'tmux-plugins/tmux-continuum'  # 让 resurrect 自动周期保存 + 启动恢复
set -g @plugin 'tmux-plugins/tmux-yank'       # copy-mode 内容自动同步到系统剪贴板（wl-copy/pbcopy 等）
set -g @plugin 'fcsonline/tmux-thumbs'        # 屏幕上所有 URL/path/hash 叠加 hint，单键复制（vimium 风）

# thumbs：选中后除了 tmux buffer，再推一份到系统剪贴板（wl-copy；macOS 上换 pbcopy）
set -g @thumbs-command 'tmux set-buffer -- {} && tmux run -b "tmux show-buffer | wl-copy" && tmux display-message "Copied: {}"'

# resurrect：除了 cwd/布局外，再存一份 pane 屏幕字符（重启后能看到上次屏上是什么）
set -g @resurrect-capture-pane-contents 'on'

# continuum：开机自动恢复 + 每 15 分钟自动存档
# 旧快照清理由 systemd user timer 处理：~/.config/systemd/user/tmux-resurrect-cleanup.timer
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# 必须放在所有 @plugin 之后，否则首次安装会漏插件
run '$HOME/.tmux/plugins/tpm/tpm'
