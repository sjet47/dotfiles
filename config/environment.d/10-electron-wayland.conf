# 让 systemd user service(如 vicinae)启动的 Electron 应用走 Wayland 原生。
#
# 会话经 sddm → start-hyprland → Hyprland 启动(非 uwsm),systemd user
# manager 与 Hyprland 是并行的两条链,不继承 Hyprland 的 hl.env。
# 因此 env.lua 只能覆盖 Hyprland 直接启动的应用,而 vicinae 这类 systemd
# user service 启动的应用拿不到——需在此再设一份。
#
# 分工:env.lua 覆盖 Hyprland 直接路径;本文件覆盖 systemd user service 路径。
# 用 wayland(强制)而非 auto:auto 让 Electron 自行检测,在 systemd scope
# 这条路径上(vicinae 启动)检测会失败回退 X11;wayland 不检测、直接用。
ELECTRON_OZONE_PLATFORM_HINT=wayland
