# VSCode 启动参数。/usr/bin/code 会读取本文件,把 flags 追加到启动命令,
# 覆盖所有 code 启动路径(vicinae 脚本 / 应用菜单 / 终端),无需逐个配。
#
# code 的 CLI→单例 IPC 链会丢掉 ELECTRON_OZONE_PLATFORM_HINT 环境变量(fresh
# start 也回退 X11),所以必须用命令行 flag 显式指定后端。
#
# 不加 --enable-wayland-ime:VSCode 的 code CLI 不认这个 flag 会告警,且较新
# Electron 已通过 text-input-v3 自动支持 fcitx5,无需显式开启。
--ozone-platform=wayland
