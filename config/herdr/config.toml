onboarding = false
# herdr configuration
# Place this file at ~/.config/herdr/config.toml

# Show first-run notification setup on startup.
# Missing also shows onboarding; set false after you've chosen.
# onboarding = true
[terminal]
	default_shell = "zsh"
	shell_mode = "auto"
	new_cwd = "follow"

[theme]
    # Built-in themes: catppuccin, tokyo-night, dracula, nord, gruvbox,
    #                  one-dark, solarized, kanagawa, rose-pine, vesper
    name = "one-dark"

    # Override individual color tokens on top of the base theme.
    # Accepts: hex (#rrggbb), named colors, rgb(r,g,b), or panel_bg = "reset"
    # [theme.custom]
    # panel_bg = "reset"
    # accent = "#f5c2e7"
    # red = "#ff6188"
    # green = "#a6e3a1"

[ui]
    # Sidebar width (auto-scaled based on workspace names, this sets the default)
    # sidebar_width = 26

    # Ask for confirmation before closing a workspace
    # confirm_close = true

    # Show detected/reported agent labels in split pane borders when no manual pane name is set.
    # show_agent_labels_on_pane_borders = false

    # Agent panel scope: "current" or "all". Toggling it in the sidebar saves this setting.
    # agent_panel_scope = "all"

    # Accent color for highlights, borders, and navigation UI.
    # Accepts: hex (#89b4fa), named colors (cyan, blue, magenta), or rgb(r,g,b)
    # accent = "cyan"

    # Background notification popup delivery
    show_agent_labels_on_pane_borders = true
    agent_panel_scope = "all"
    [ui.toast]
        # off = disable pop-up notifications
        # herdr = show top-right in-app toasts
        # terminal = ask the outer terminal to show a desktop notification
        # delivery = "off"

        # Play sounds when agents change state in background workspaces
        delivery = "terminal"
	[ui.toast.herdr]
		position = "top-right"
	[ui.toast.clipboard]
		enabled = true
		position = "top-right"	
    [ui.sound]
        enabled = true
        # Optional custom mp3 sound files. Relative paths are resolved from this config file's directory.
        # path = "sounds/notification.mp3"   # one mp3 file for all sound notifications
        # done_path = "sounds/done.mp3"      # overrides only finished notifications
        # request_path = "sounds/request.mp3" # overrides only needs-attention notifications

        # Per-agent overrides: default | on | off
        # By default, droid is muted.
        # [ui.sound.agents]
        # droid = "off"

[advanced]
    # Allow launching herdr from inside a herdr-managed pane.
    # allow_nested = false
    # Maximum scrollback buffer size in bytes retained per pane terminal.
    # Matches Ghostty's default scrollback-limit behavior.
    # scrollback_limit_bytes = 10000000


[keys]
    # Prefix key to enter navigate mode (default: "ctrl+b")
    # Examples: "ctrl+b", "f12", "esc", "-"
    # Accepted syntax: plain keys, ctrl/shift/alt modifiers, and special keys like enter/tab/esc/left/right/up/down
    # Most reliable bindings are plain keys, ctrl+letter, esc/tab/enter, and function keys.
    # alt+... and punctuation-with-modifiers may depend on your terminal/tmux setup.
    prefix = "ctrl+o"

	# Herdr actions
    detach = "prefix+d"             # optional explicit detach shortcut in server/client mode
    reload_config = "prefix+shift+r"      # optional shortcut to reload config.toml without restarting
	goto = "prefix+s"
    open_notification_target = "prefix+enter" # optional shortcut to jump to the visible notification target
    toggle_sidebar = "prefix+b"
	
	# Agent actions
    previous_agent = "alt+o"     # optional, unset by default
    next_agent = "alt+i"         # optional, unset by default
	focus_agent = "prefix+alt+1..9"

    # Workspace actions
	workspace_picker = "prefix+w"
    new_workspace = "prefix+n"
    rename_workspace = "prefix+shift+n"
    close_workspace = "prefix+shift+d"
    previous_workspace = "alt+k" # optional, unset by default
    next_workspace = "alt+j"     # optional, unset by default
	switch_workspace = "prefix+shift+1..9"

	# Tab actions
    new_tab = "prefix+c"
    rename_tab = "prefix+shift+c"         # optional, unset by default
    close_tab = "prefix+shift+w"          # optional, unset by default
    previous_tab = "alt+h"       # optional, unset by default
    next_tab = "alt+l"           # optional, unset by default
	switch_tab = "prefix+1..9"

	# Pane actions
    split_vertical = "prefix+\\"
    split_horizontal = "prefix+-"
    resize_mode = "prefix+r"
    focus_pane_left = "prefix+h"    # optional, unset by default
    focus_pane_down = "prefix+j"    # optional, unset by default
    focus_pane_up = "prefix+k"      # optional, unset by default
    focus_pane_right = "prefix+l"   # optional, unset by default
	swap_pane_left = "prefix+shift+h"
	swap_pane_down = "prefix+shift+j"
	swap_pane_up = "prefix+shift+k"
	swap_pane_right = "prefix+shift+l"
    rename_pane = "prefix+p"        # optional, unset by default
    close_pane = "prefix+x"
    fullscreen = "prefix+f"

	# Worktree actions
	new_worktree = "prefix+shift+g"
	open_worktree = "prefix+shift+o"
	remove_worktree = "prefix+alt+d"


    # Custom prefix-mode commands. Press prefix, then the configured key.
    # type = "shell" runs detached in the background.
    # type = "pane" opens a temporary pane and closes it when the command exits.
    # [[keys.command]]
    # key = "g"
    # type = "pane"
    # command = "lazygit"
[session]
	resume_agents_on_restore = true

[experimental]
	pane_history = true
