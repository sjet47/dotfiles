##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrules that are useful

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

windowrule {
    name = float-satty
    match:class = com.gabm.satty
    float = yes
}

windowrule {
    # Feishu 图片预览：XWayland 窗口，class 为空，title 固定为"图片"
    name = float-feishu-image-preview
    match:class = ^$
    match:title = ^图片$
    match:xwayland = true
    float = yes
}

windowrule {
    name = float-dropdowns
    match:class = dropdown
    float = yes
    size = 80% 40%
    move = 10% 0%
    animation = slide top
}

xwayland {
    force_zero_scaling = true
}

dwindle {
    force_split = 2
    preserve_split = true
    smart_split = false
}

# anonymous rule syntax (Hyprland 0.53+)
layerrule = blur on, ignore_alpha 0, match:namespace vicinae
layerrule = no_anim on, match:namespace vicinae
