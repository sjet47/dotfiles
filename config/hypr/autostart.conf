#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &
exec-once = uwsm-app -- hypridle
exec-once = uwsm-app -- mako
exec-once = uwsm-app -- waybar
exec-once = uwsm-app -- awww
exec-once = uwsm-app -- fcitx5 -d
exec-once = uwsm-app -- gnome-keyring-daemon --start --components=secrets,ssh,pkcs11
exec-once = uwsm-app -- vicinae server
#exec-once = uwsm-app -- kwalletd6
exec-once = uwsm-app -- keepassxc

exec-once = [workspace 1 silent] uwsm-app -- kitty -e claude
exec-once = [workspace 1 silent] uwsm-app -- code ~/repo/other/omarchy
exec-once = [workspace 1 silent] uwsm-app -- code ~/dotfiles

exec-once = [workspace 2 silent] uwsm-app -- google-chrome-stable
exec-once = [workspace 2 silent] uwsm-app -- feishu
