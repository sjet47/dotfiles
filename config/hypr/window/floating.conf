#############################
### FLOATING WINDOW RULES ###
#############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
#
# Workflow: 给窗口添加自动 floating 规则
# 1. 先聚焦目标窗口。
# 2. 查看窗口信息：
#      hyprctl activewindow -j | jq '{class,title,initialClass,initialTitle,xwayland,floating}'
#    或查看全部窗口并按关键词过滤：
#      hyprctl clients -j | jq -r '.[] | select((.class|test("(?i)关键词")) or (.title|test("(?i)关键词"))) | {class,title,initialClass,initialTitle,xwayland,floating}'
# 3. 优先使用稳定的 match 条件：
#      - 整个应用都浮动：match:class = 精确 class
#      - 只让某类弹窗浮动：match:class + match:title 正则
#      - XWayland/特殊窗口：必要时加 match:xwayland、match:initialClass、match:initialTitle
# 4. 添加规则模板：
#      windowrule {
#          name = float-example
#          match:class = example.Class
#          match:title = .*可选标题正则.*
#          float = yes
#      }
# 5. 重载配置：
#      hyprctl reload
# 6. 已经打开的窗口不会总是自动应用新规则；需要时手动切换：
#      hyprctl dispatch togglefloating
#    或重开该窗口验证。

windowrule {
    # Fix some dragging issues with XWayland floating windows
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

windowrule {
    name = float-dropdowns
    match:class = dropdown
    float = yes
    size = 80% 40%
    move = 10% 0%
    animation = slide top
}

windowrule {
    name = move-hyprland-run
    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

windowrule {
    name = float-satty
    match:class = com.gabm.satty
    float = yes
}

windowrule {
    name = float-ksnip
    match:class = org.ksnip.ksnip
    float = yes
}

windowrule {
    # KeePassXC 数据库解锁/打开窗口，避免启动时占用 tiling 布局
    name = float-keepassxc-database
    match:class = org.keepassxc.KeePassXC
    match:title = .* - KeePassXC$
    float = yes
}

windowrule {
    # XDG portal 弹窗（文件选择/屏幕共享授权等）
    name = float-xdg-portal
    match:class = ^xdg-desktop-portal-(gtk|kde|hyprland)$
    float = yes
}

# 飞书相关窗口浮动规则
windowrule {
    # Feishu 图片预览：XWayland 窗口，class 为空，title 固定为"图片"
    name = float-feishu-image-preview
    match:class = ^$
    match:title = ^图片$
    match:xwayland = true
    float = yes
}
windowrule {
    # Feishu 会话记录：XWayland 窗口，class 为 Feishu，title 包含"会话记录"
    name = float-feishu-chat-history
    match:class = Feishu
    match:title = .*会话记录$
    match:xwayland = true
    float = yes
}
