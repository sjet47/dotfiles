general {
    lock_cmd = pidof hyprlock || hyprlock
}

listener {
    timeout = 900
    # 单参数作用于全部显示器;本版本带显示器名的两参数写法是空操作,不会真正熄屏。
    # 唤醒交给 misc.mouse_move/key_press_enables_dpms(input/looknfeel 模块),无需 on-resume。
    # 注:外接 DP 唤醒冻结靠内核参数 amdgpu.dcdebugmask=0x410(关 Panel Replay)根治,见 rEFInd cmdline。
    on-timeout = hyprctl dispatch 'hl.dsp.dpms("off")'
}

listener {
    timeout = 1800
    on-timeout = loginctl lock-session
}
