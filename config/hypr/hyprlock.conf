general {
    ignore_empty_input = true
    hide_cursor = true
}

animations {
    enabled = false
}

background {
    monitor =
    path = /home/sjet/repo/other/omarchy/themes/tokyo-night/backgrounds/1-sunset-lake.png
    blur_passes = 3
    blur_size = 8
}

input-field {
    monitor =
    size = 400, 60
    position = 0, 0
    halign = center
    valign = center

    inner_color = rgba(1a1b26cc)
    outer_color = rgba(7aa2f7ff)
    outline_thickness = 2
    rounding = 8

    font_family = JetBrainsMono Nerd Font
    font_color = rgba(c0caf5ff)

    placeholder_text = <i>Enter Password</i>
    check_color = rgba(9ece6aff)
    fail_color = rgba(f7768eff)
    fail_text = <i>$FAIL ($ATTEMPTS)</i>

    shadow_passes = 0
    fade_on_empty = true
    fade_timeout = 1500
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date '+%H:%M')"
    font_size = 130
    font_family = JetBrainsMono Nerd Font
    color = rgba(c0caf5ff)
    position = 0, 180
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:3600000] echo "$(date '+%A, %B %-d')"
    font_size = 24
    font_family = JetBrainsMono Nerd Font
    color = rgba(c0caf5cc)
    position = 0, 320
    halign = center
    valign = center
}

auth {
    fingerprint:enabled = false
}
