general {
    ignore_empty_input = true
    hide_cursor = true
}

animations {
    enabled = false
}

background {
    monitor =
    path = /home/sjet/repo/other/omarchy/themes/tokyo-night/backgrounds/1-sunset-lake.png
    blur_passes = 1
    blur_size = 4
}

# Time (KDE-style, 12-hour with AM/PM)
label {
    monitor =
    text = cmd[update:60000] echo "$(date '+%H:%M')"
    font_size = 100
    font_family = Noto Sans
    color = rgba(f5f5f7ff)
    position = 0, 420
    halign = center
    valign = center
}

# Date (just below time)
label {
    monitor =
    text = cmd[update:3600000] echo "$(date '+%A, %B %-d, %Y')"
    font_size = 45
    font_family = Noto Sans
    color = rgba(f5f5f7cc)
    position = 0, 280
    halign = center
    valign = center
}

# Password input
input-field {
    monitor =
    size = 280, 44
    position = 0, 0
    halign = center
    valign = center

    inner_color = rgba(1c1c1eb3)
    outer_color = rgba(ffffff1a)
    outline_thickness = 1
    rounding = 22

    font_family = Noto Sans
    font_color = rgba(f5f5f7ff)

    placeholder_text = <i>Enter Password</i>
    check_color = rgba(34c759ff)
    fail_color = rgba(ff453aff)
    fail_text = <i>$FAIL ($ATTEMPTS)</i>

    shadow_passes = 2
    shadow_size = 6
    shadow_color = rgba(00000040)
    shadow_boost = 1.0

    fade_on_empty = true
    fade_timeout = 1500
}

auth {
    fingerprint:enabled = false
}
