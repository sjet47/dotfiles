# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod ALT, L, exec, hyprlock
bind = $mainMod ALT, M, exec, wlogout -p layer-shell
bind = $mainMod, Q, killactive,
bind = $mainMod, RETURN, exec, uwsm-app -- $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, T, togglefloating,
bind = $mainMod, space, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, S, layoutmsg, togglesplit # dwindle
bind = SUPER, V, exec, cliphist list | vicinae dmenu | cliphist decode | wl-copy
# 截图：smart(拉框, <20px² 自动吸附到所在窗口/显示器) / region / window / fullscreen
# 默认 smart：冻屏 + 自动 wl-copy + 落盘 ~/Pictures，通知点击用 ksnip 标注
bind = , PRINT,            exec, ~/.config/hypr/scripts/screenshot.sh
bind = SUPER SHIFT, S,     exec, ~/.config/hypr/scripts/screenshot.sh region
bind = SUPER SHIFT, W,     exec, ~/.config/hypr/scripts/screenshot.sh window
bind = SUPER SHIFT, F,     exec, ~/.config/hypr/scripts/screenshot.sh fullscreen
