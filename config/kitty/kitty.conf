# Linux kitty config — tab/pane 管理交给 tmux，kitty 只负责字体/配色/剪贴板/字号

font_family      JetBrainsMono Nerd Font
font_size        10.0

background_opacity 0.92
background_blur    20

confirm_os_window_close 0
copy_on_select clipboard

# Keep content area compact.
window_padding_width 3

# --- Minimal tab bar ---
# Show the tab bar only when there are at least two tabs.
tab_bar_min_tabs 2
tab_bar_edge bottom
tab_bar_style separator
# Explicit separator makes tab boundaries visible while still using only one row.
tab_separator " │ "
tab_switch_strategy previous

# Compact titles. Manual rename via ctrl+k > r overrides {title}.
tab_title_template " {index}:{title} "
active_tab_title_template "{fmt.bold} {index}:{title} {fmt.nobold}"

# --- Keymap ---
# 清空所有 kitty 默认绑定，再选择性 map（避免和 tmux 冲突）
clear_all_shortcuts yes

# 标准 Linux 剪贴板
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+insert paste_from_clipboard

# 字号（clear_all_shortcuts 后 kitty 默认字号键也没了，显式恢复）
map ctrl+shift+equal change_font_size all +1.0
map ctrl+shift+plus  change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0
map ctrl+shift+0     change_font_size all 0

# macOS dark / Snazzy style
foreground            #f5f5f7
background            #1c1c1e
cursor                #f5f5f7
cursor_text_color     #1c1c1e

selection_foreground  #1c1c1e
selection_background  #d0d0d0

url_color             #57c7ff

